spring:
  application:
    name: ssu-bench
  datasource:
    url: ${POSTGRES_URI}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: "classpath:/liquibase/changelog.yaml"

server:
  port: 8080
  shutdown: graceful

security:
  jwt:
    expiration: 3h
    issuer: ssu-bench
    secret: ${JWT_SECRET}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    url: /openapi.yaml
    operationsSorter: method
    tagsSorter: alpha
