databaseChangeLog:
  - changeSet:
      id: 01
      author: sour-soup
      comment: "Create users table with roles and statuses"
      changes:
        - createTable:
            tableName: users
            remarks: "Application users (customers, executors, admins)"
            columns:
              - column: { name: id, type: BIGINT, autoIncrement: true, remarks: "PK" }
              - column: { name: username, type: VARCHAR(255), remarks: "Unique login" }
              - column: { name: password_hash, type: VARCHAR(255), remarks: "BCrypt hash" }
              - column: { name: role, type: VARCHAR(32), remarks: "CUSTOMER, EXECUTOR, ADMIN" }
              - column: { name: balance, type: BIGINT, defaultValueNumeric: 0, remarks: "User balance in soups" }
              - column: { name: status, type: VARCHAR(32), defaultValue: "ACTIVE", remarks: "ACTIVE, BLOCKED" }
              - column: { name: created_at, type: TIMESTAMP, defaultValueComputed: "CURRENT_TIMESTAMP", remarks: "Creation time" }
              - column: { name: updated_at, type: TIMESTAMP, defaultValueComputed: "CURRENT_TIMESTAMP", remarks: "Last update time" }
        - addPrimaryKey:
            tableName: users
            columnNames: id
            constraintName: pk_users
        - addUniqueConstraint:
            tableName: users
            columnNames: username
            constraintName: uk_users_username
        - createIndex:
            tableName: users
            indexName: idx_users_role_status
            columns:
              - column: { name: role }
              - column: { name: status }
        - createIndex:
            tableName: users
            indexName: idx_users_username
            columns:
              - column: { name: username }
