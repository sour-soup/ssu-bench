databaseChangeLog:
  - changeSet:
      id: 05
      author: sour-soup
      comment: "Additional indexes for sorting and filtering performance"
      changes:
        - createIndex:
            tableName: tasks
            indexName: idx_tasks_created_at_desc
            columns:
              - column: { name: created_at }
        - createIndex:
            tableName: bids
            indexName: idx_bids_created_at_desc
            columns:
              - column: { name: created_at }
        - createIndex:
            tableName: users
            indexName: idx_users_created_at_desc
            columns:
              - column: { name: created_at }

